<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雪梨老师选题母题看板 v9 - 全量视频总览</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;
  --surface:#161b22;
  --card:#1c2330;
  --card2:#212838;
  --border:#2d3748;
  --text:#e2e8f0;
  --muted:#8899a8;
  --accent:#7c8cff;
  --accent2:#5a6fff;
  --red:#ff6b7a;
  --green:#4ade80;
  --orange:#fbbf24;
  --blue:#60a5fa;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
a{color:inherit;text-decoration:none}
img{width:100%;height:100%;object-fit:cover;display:block}

/* ── Header ── */
.header{
  position:sticky;top:0;z-index:100;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap
}
.header h1{font-size:17px;font-weight:700;color:#fff;flex-shrink:0}
.hstats{display:flex;gap:6px;flex-wrap:wrap}
.hstat{
  background:var(--card);border:1px solid var(--border);
  padding:3px 10px;border-radius:999px;font-size:11px;color:var(--muted)
}
.hstat strong{color:var(--text);font-weight:600}

/* ── Tab Navigation ── */
.tab-nav{
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:10px 24px;
  display:flex;gap:8px
}
.tab-btn{
  background:var(--card);border:1px solid var(--border);
  color:var(--muted);padding:8px 16px;border-radius:8px;
  font-size:13px;cursor:pointer;transition:all .2s
}
.tab-btn:hover{background:var(--card2);color:var(--text)}
.tab-btn.active{
  background:var(--accent);border-color:var(--accent);
  color:#fff;font-weight:500
}

/* ── Search ── */
.search-wrap{
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:10px 24px
}
.search-wrap input{
  width:100%;max-width:480px;
  background:var(--card);border:1px solid var(--border);
  color:var(--text);padding:8px 14px;border-radius:9px;
  font-size:13px;outline:none
}
.search-wrap input:focus{border-color:var(--accent)}

/* ── Layout ── */
.layout{display:flex}

/* ── Sidebar ── */
.sidebar{
  width:280px;min-width:280px;
  background:var(--surface);border-right:1px solid var(--border);
  overflow-y:auto;height:calc(100vh - 165px)
}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border)}

.cat-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;background:#0d1117;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .15s
}
.cat-hdr:hover{background:#131922}
.cat-hdr.active{background:#131922;border-left:3px solid var(--accent)}
.cat-name{font-size:13px;font-weight:600;color:var(--text)}
.cat-meta{font-size:10px;color:var(--muted)}

.cat-topics{display:none;background:#0f151e}
.cat-topics.open{display:block}

.topic-row{
  padding:7px 14px 7px 22px;
  border-bottom:1px solid rgba(255,255,255,.03);
  cursor:pointer;transition:background .15s
}
.topic-row:hover{background:var(--card2)}
.topic-row.active{background:#1a2133;border-left:3px solid var(--accent)}
.tname{font-size:12px;color:var(--text)}
.tmeta{font-size:10px;color:var(--muted);margin-top:1px}

/* ── Main Content ── */
.main{flex:1;overflow-y:auto;padding:18px 22px;height:calc(100vh - 165px)}
.main::-webkit-scrollbar{width:5px}
.main::-webkit-scrollbar-thumb{background:var(--border)}

/* ── All Videos View ── */
.all-videos-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;flex-wrap:wrap;gap:12px
}
.all-videos-title{font-size:18px;font-weight:700;color:#fff}
.sort-controls{display:flex;gap:8px;flex-wrap:wrap}
.sort-btn{
  background:var(--card);border:1px solid var(--border);
  color:var(--muted);padding:6px 12px;border-radius:6px;
  font-size:12px;cursor:pointer
}
.sort-btn:hover{background:var(--card2)}
.sort-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── Video List Table (FIXED STICKY) ── */
.video-list-container{
  overflow-x:auto;
  margin-top:16px;
  background:var(--card);
  border-radius:12px;
  border:1px solid var(--border)
}
.video-list{
  width:100%;
  border-collapse:collapse;
  font-size:12px
}
.video-list thead{
  position:sticky;
  top:0;
  z-index:10
}
.video-list th{
  text-align:left;padding:12px 8px;
  background:var(--surface);
  border-bottom:2px solid var(--accent);
  font-size:11px;font-weight:600;color:var(--muted);
  white-space:nowrap
}
.video-list td{
  padding:10px 8px;
  border-bottom:1px solid var(--border);
  vertical-align:middle;
  background:var(--card)
}
.video-list tbody tr:hover td{background:var(--card2)}
.video-list tbody tr{cursor:pointer}

/* Script expansion row */
.script-row td{
  padding:0;
  background:var(--bg)!important;
  border-bottom:1px solid var(--border)
}
.script-content{
  padding:16px;
  display:none
}
.script-content.show{display:block}
.script-text{
  background:var(--surface);
  border-radius:8px;
  padding:16px;
  font-size:13px;
  line-height:1.8;
  white-space:pre-wrap;
  word-break:break-word;
  max-height:300px;
  overflow-y:auto
}

.video-cover{
  width:60px;height:45px;border-radius:6px;
  background:var(--card2);overflow:hidden
}
.video-cover img{width:100%;height:100%;object-fit:cover}

.video-title{
  color:var(--text);font-weight:500;
  max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap
}

.cat-tag{
  display:inline-block;background:var(--card2);
  border:1px solid var(--border);color:var(--blue);
  padding:2px 8px;border-radius:999px;font-size:11px;
  cursor:pointer;white-space:nowrap
}
.cat-tag:hover{background:var(--blue);color:#fff}

.topic-tag{
  display:inline-block;background:var(--card2);
  border:1px solid var(--border);color:var(--accent);
  padding:2px 8px;border-radius:999px;font-size:11px;
  cursor:pointer;white-space:nowrap
}
.topic-tag:hover{background:var(--accent);color:#fff}

.stat-cell{font-size:11px;white-space:nowrap}
.likes{color:var(--red);font-weight:600}
.favorites{color:var(--orange)}
.comments{color:var(--blue)}
.shares{color:var(--green)}

.date-text{color:var(--muted);font-size:11px;white-space:nowrap}

.link-btn{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--card2);border:1px solid var(--border);
  color:var(--accent);padding:4px 10px;border-radius:6px;
  font-size:11px;cursor:pointer
}
.link-btn:hover{background:var(--accent);color:#fff}

/* ── Video Cards Grid ── */
.video-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:16px
}
.video-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;cursor:pointer
}
.video-card:hover{border-color:var(--accent)}
.video-card-cover{height:140px;background:var(--card2)}
.video-card-body{padding:12px}
.video-card-title{
  font-size:13px;font-weight:500;color:var(--text);
  line-height:1.4;margin-bottom:8px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden
}
.video-card-meta{
  display:flex;align-items:center;justify-content:space-between;
  font-size:11px;color:var(--muted)
}
.video-card-tags{
  display:flex;gap:4px;flex-wrap:wrap;margin-top:8px
}

/* ── View Toggle ── */
.view-toggle{display:flex;gap:4px}
.view-toggle button{
  background:var(--card);border:1px solid var(--border);
  color:var(--muted);padding:6px 10px;border-radius:6px;
  font-size:12px;cursor:pointer
}
.view-toggle button.active{background:var(--accent);color:#fff}

/* ── Empty State ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}

/* ── Edit Topic Dropdown ── */
.edit-topic-wrap{
  margin-top:16px;padding-top:12px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-wrap:wrap
}
.edit-topic-btn{
  background:var(--card2);border:1px solid var(--border);
  color:var(--orange);padding:6px 14px;border-radius:8px;
  font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:4px
}
.edit-topic-btn:hover{background:var(--orange);color:#fff}
.edit-select{
  background:var(--card);border:1px solid var(--border);
  color:var(--text);padding:6px 10px;border-radius:8px;
  font-size:12px;outline:none;max-width:200px
}
.edit-select:focus{border-color:var(--accent)}
.edit-save-btn{
  background:var(--accent);border:none;
  color:#fff;padding:6px 14px;border-radius:8px;
  font-size:12px;cursor:pointer
}
.edit-save-btn:hover{background:var(--accent2)}
.edit-msg{font-size:11px;color:var(--green);margin-left:8px}
.export-btn{
  position:fixed;bottom:20px;right:20px;z-index:50;
  background:var(--accent);border:none;color:#fff;
  padding:10px 18px;border-radius:12px;font-size:13px;
  cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.4);
  display:none
}
.export-btn:hover{background:var(--accent2)}
.export-btn.show{display:block}

/* ── Hidden ── */
.hidden{display:none!important}

/* ── Mobile Drawer ── */
.mobile-nav-btn{
  display:none;
  background:var(--card);border:1px solid var(--border);
  color:var(--text);padding:8px 14px;border-radius:8px;
  font-size:13px;cursor:pointer;align-items:center;gap:6px
}
.drawer-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.6);z-index:200;
  display:none;opacity:0;transition:opacity .25s
}
.drawer-overlay.show{display:block;opacity:1}
.drawer{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-top-left-radius:16px;border-top-right-radius:16px;
  z-index:201;max-height:80vh;overflow-y:auto;
  transform:translateY(100%);transition:transform .3s ease;
  padding-bottom:env(safe-area-inset-bottom,0)
}
.drawer.show{transform:translateY(0)}
.drawer-handle{
  width:40px;height:4px;background:var(--border);border-radius:2px;
  margin:10px auto 6px
}
.drawer-title{
  padding:8px 16px 12px;font-size:15px;font-weight:600;color:#fff;
  border-bottom:1px solid var(--border)
}

/* ── Mobile Video Card (list replacement) ── */
.mobile-video-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:12px;margin-bottom:10px
}
.mobile-video-card .mv-top{display:flex;gap:10px;align-items:flex-start}
.mobile-video-card .mv-cover{
  width:90px;height:68px;border-radius:8px;overflow:hidden;
  background:var(--card2);flex-shrink:0
}
.mobile-video-card .mv-info{flex:1;min-width:0}
.mobile-video-card .mv-title{
  font-size:13px;font-weight:500;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:6px;line-height:1.4
}
.mobile-video-card .mv-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.mobile-video-card .mv-stats{
  display:flex;gap:10px;font-size:11px;color:var(--muted);flex-wrap:wrap
}
.mobile-video-card .mv-bottom{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:8px;padding-top:8px;border-top:1px solid var(--border);
  font-size:11px;color:var(--muted)
}

@media(max-width:768px){
  .sidebar{display:none!important}
  .mobile-nav-btn{display:inline-flex}

  /* Header */
  .header{padding:10px 14px;gap:10px}
  .header h1{font-size:15px}
  .hstat{font-size:10px;padding:2px 8px}

  /* Tab nav */
  .tab-nav{padding:8px 14px;gap:6px}
  .tab-btn{padding:7px 12px;font-size:12px;min-height:38px}

  /* Search */
  .search-wrap{padding:8px 14px}
  .search-wrap input{max-width:100%;padding:10px 14px;font-size:14px}

  /* Main */
  .main{padding:12px 14px;height:calc(100vh - 180px)}

  /* All videos header */
  .all-videos-header{flex-direction:column;align-items:flex-start;gap:10px}
  .all-videos-title{font-size:16px}
  .sort-controls{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .sort-btn{white-space:nowrap;min-height:36px;padding:6px 14px}
  .view-toggle button{min-height:36px}

  /* Hide table on mobile, show mobile cards */
  .video-list-container{display:none!important}
  .mobile-video-list{display:block!important}

  /* Video grid */
  .video-grid{grid-template-columns:1fr;gap:10px}
  .video-card-cover{height:160px}

  /* Modal full screen on mobile */
  .modal-overlay{padding:0;align-items:flex-end}
  .modal-content{
    max-width:100%;max-height:92vh;
    border-radius:16px 16px 0 0
  }
  .modal-header{padding:14px 16px}
  .modal-header h3{font-size:14px}
  .modal-body{padding:14px 16px}
  .modal-meta{font-size:12px;gap:8px}
  .modal-script{padding:14px;font-size:13px;line-height:1.7}

  /* Topic detail cards */
  .layout{flex-direction:column}

  /* Touch targets */
  .cat-tag,.topic-tag{padding:4px 10px;font-size:11px;min-height:28px;display:inline-flex;align-items:center}
  .link-btn{padding:6px 12px;min-height:32px}
  .topic-row{padding:10px 14px 10px 22px;min-height:44px}
  .cat-hdr{padding:12px 14px;min-height:44px}
}

/* ── Modal for All Videos Script ── */
.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.8);z-index:1000;
  display:none;align-items:center;justify-content:center;
  padding:20px
}
.modal-overlay.show{display:flex}
.modal-content{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;width:100%;max-width:700px;max-height:80vh;
  display:flex;flex-direction:column;overflow:hidden
}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid var(--border)
}
.modal-header h3{font-size:16px;font-weight:600;color:#fff}
.modal-close{
  background:none;border:none;color:var(--muted);
  font-size:24px;cursor:pointer;padding:0;width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  border-radius:8px;transition:all .2s
}
.modal-close:hover{background:var(--card);color:var(--text)}
.modal-body{
  padding:20px;overflow-y:auto;flex:1
}
.modal-meta{
  display:flex;gap:16px;margin-bottom:16px;font-size:13px;color:var(--muted);flex-wrap:wrap
}
.modal-script{
  background:var(--bg);border-radius:12px;padding:20px;
  font-size:14px;line-height:1.8;color:var(--text);
  white-space:pre-wrap;word-break:break-word
}
</style>
</head>
<body>

<div class="header">
  <h1>🦞 雪梨老师选题母题看板 v9+</h1>
  <div class="hstats" id="hstats"></div>
</div>

<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('topics')">📂 母题看板</button>
  <button class="tab-btn" onclick="switchTab('all')">📋 全部视频</button>
  <button class="mobile-nav-btn" onclick="openDrawer()">☰ 分类</button>
</div>

<!-- Mobile Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title">选择分类 / 母题</div>
  <div id="drawerContent"></div>
</div>

<div class="search-wrap">
  <input id="searchInput" placeholder="搜索视频标题 / 母题 / 关键词...">
</div>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main"></main>
</div>

<!-- Modal for All Videos Script -->
<div class="modal-overlay" id="scriptModal" onclick="closeScriptModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modalTitle">视频文案</h3>
      <button class="modal-close" onclick="closeScriptModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-meta" id="modalMeta"></div>
      <div class="modal-script" id="modalScript"></div>
      <div class="edit-topic-wrap" id="editTopicWrap"></div>
    </div>
  </div>
</div>

<!-- Export button (appears after edits) -->
<button class="export-btn" id="exportBtn" onclick="exportEdits()">💾 导出修改 (<span id="editCount">0</span>条)</button>

<script src="data/dashboard_data_v9.js"></script>
<script>
const DATA = DASHBOARD_V7;
let state = {curTab:'topics',curCat:null,curTopic:null,q:'',sort:'likes',viewMode:'list'};

function esc(s){return ((s||'')+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmt(n){if(n>=10000000)return(n/10000000).toFixed(1)+'千万';if(n>=10000)return(n/10000).toFixed(1)+'万';if(n>=1000)return(n/1000).toFixed(1)+'k';return String(n||0)}

init();

function init(){
  document.getElementById('hstats').innerHTML =
    `<span class=hstat><strong>${DATA.total_videos}</strong>条视频</span>` +
    `<span class=hstat><strong>${DATA.cat_summary.length}</strong>大类</span>` +
    `<span class=hstat><strong>${DATA.total_topics}</strong>母题</span>`;
  renderSidebar();
  renderMain();
}

function switchTab(tab){
  state.curTab = tab;
  document.querySelectorAll('.tab-btn').forEach(btn=>btn.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('sidebar').style.display = tab==='topics'?'block':'none';
  renderMain();
}

function renderSidebar(){
  const sb = document.getElementById('sidebar');
  let html = '';
  for(const cat of DATA.cat_summary){
    const isOpen = state.curCat === cat.name;
    html += `<div class="cat-hdr${isOpen?' active':''}" onclick="goCat('${esc(cat.name)}')">
      <span class="cat-name">${esc(cat.name)}</span>
      <span class="cat-meta">${cat.count}条</span>
    </div>`;
    html += `<div class="cat-topics${isOpen?' open':''}">`;
    const q = state.q.toLowerCase();
    const filtered = cat.topics.filter(t=>{
      if(!q)return true;
      return t.topic.toLowerCase().includes(q)||t.videos.some(v=>(v.title||'').toLowerCase().includes(q)||(v.script||'').toLowerCase().includes(q));
    });
    for(const t of filtered.sort((a,b)=>b.total_likes-a.total_likes)){
      const isAct = state.curTopic?.topic===t.topic;
      html += `<div class="topic-row${isAct?' active':''}" onclick="goTopic('${esc(cat.name)}','${esc(t.topic)}')">
        <div class="tname">${esc(t.topic)}</div>
        <div class="tmeta">${t.count}条 · ${fmt(t.total_likes)}赞</div>
      </div>`;
    }
    html += '</div>';
  }
  sb.innerHTML = html;
}

function goCat(name){state.curCat=state.curCat===name?null:name;state.curTopic=null;renderSidebar();renderMain();}
function goTopic(cat,topic){state.curCat=cat;state.curTopic={cat,topic};renderSidebar();renderMain();}

function renderMain(){
  const main = document.getElementById('main');
  if(state.curTab==='topics')renderTopicsView(main);
  else renderAllVideosView(main);
}

function renderTopicsView(main){
  if(!state.curCat){renderOverview(main);return;}
  const catData = DATA.cat_summary.find(c=>c.name===state.curCat);
  if(!state.curTopic){renderCatTopics(main,catData);return;}
  const topic = catData?.topics.find(t=>t.topic===state.curTopic.topic);
  if(topic)renderTopicDetail(main,topic);
  else main.innerHTML='<div class=empty>无数据</div>';
}

function renderOverview(main){
  main.innerHTML=`
    <div style="margin-bottom:16px"><h2 style="font-size:18px;font-weight:700;color:#fff">全部 ${DATA.total_topics} 个母题</h2></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px" id="og"></div>`;
  const q=state.q.toLowerCase();
  let all=[];
  for(const cat of DATA.cat_summary){
    for(const t of cat.topics){
      if(q&&!t.topic.toLowerCase().includes(q)&&!t.videos.some(v=>(v.title||'').toLowerCase().includes(q)||(v.script||'').toLowerCase().includes(q)))continue;
      all.push({...t,_cat:cat.name});
    }
  }
  all.sort((a,b)=>b.total_likes-a.total_likes);
  document.getElementById('og').innerHTML=all.slice(0,80).map(t=>`
    <div onclick="goTopic('${esc(t._cat)}','${esc(t.topic)}')" style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer">

function toggleScript(idx){
  const el=document.getElementById('script-'+idx);
  if(el)el.style.display=el.style.display==='none'?'block':'none';
}

function setSort(s){state.sort=s;renderMain();}

// ── All Videos View ──
function renderAllVideosView(main){
  let allVideos=[];
  for(const cat of DATA.cat_summary){
    for(const topic of cat.topics){
      for(const v of topic.videos){
        allVideos.push({...v,_topic:topic.topic,_cat:cat.name});
      }
    }
  }
  
  if(state.sort==='likes')allVideos.sort((a,b)=>b.likes-a.likes);
  else if(state.sort==='date')allVideos.sort((a,b)=>b.date.localeCompare(a.date));
  else allVideos.sort((a,b)=>a._topic.localeCompare(b._topic)||b.likes-a.likes);
  
  const q=state.q.toLowerCase();
  if(q)allVideos=allVideos.filter(v=>(v.title||'').toLowerCase().includes(q)||v._topic.toLowerCase().includes(q)||v._cat.toLowerCase().includes(q)||(v.script||'').toLowerCase().includes(q));
  
  let html=`
    <div class="all-videos-header">
      <div class="all-videos-title">全部视频 (${allVideos.length}条)</div>
      <div style="display:flex;gap:12px;align-items:center">
        <div class="sort-controls">
          <button class="sort-btn ${state.sort==='likes'?'active':''}" onclick="setVideoSort('likes')">点赞↓</button>
          <button class="sort-btn ${state.sort==='date'?'active':''}" onclick="setVideoSort('date')">时间↓</button>
          <button class="sort-btn ${state.sort==='topic'?'active':''}" onclick="setVideoSort('topic')">母题A-Z</button>
        </div>
        <div class="view-toggle">
          <button class="${state.viewMode==='list'?'active':''}" onclick="setViewMode('list')">列表</button>
          <button class="${state.viewMode==='grid'?'active':''}" onclick="setViewMode('grid')">卡片</button>
        </div>
      </div>
    </div>
  `;
  
  if(!allVideos.length){main.innerHTML=html+'<div class=empty>无匹配视频</div>';return;}
  
  if(state.viewMode==='list')html+=renderVideoList(allVideos);
  else html+=renderVideoGrid(allVideos);
  
  main.innerHTML=html;
}

function renderVideoList(videos){
  let html='<div class="video-list-container"><table class="video-list"><thead><tr>';
  html+='<th>分类</th><th style="min-width:150px">母题</th><th style="width:70px">封面</th>';
  html+='<th>标题</th><th style="text-align:center">点赞</th><th style="text-align:center">收藏</th>';
  html+='<th style="text-align:center">评论</th><th style="text-align:center">分享</th><th>时间</th><th>操作</th></tr></thead><tbody>';
  
  for(const v of videos){
    const cover=v.cover_url||'';
    const link=v.douyin_link||'#';
    html+=`<tr onclick="showScriptModal(${v.idx})">
      <td><span class="cat-tag" onclick="event.stopPropagation();goToTopic('${esc(v._cat)}',null)">${esc(v._cat)}</span></td>
      <td><span class="topic-tag" onclick="event.stopPropagation();goToTopic('${esc(v._cat)}','${esc(v._topic)}')">${esc(v._topic)}</span></td>
      <td><div class="video-cover">${cover?`<img src="${esc(cover)}">`:''}</div></td>
      <td><div class="video-title" title="${esc(v.title)}">${esc(v.title)}</div></td>
      <td style="text-align:center"><span class="stat-cell likes">${fmt(v.likes)}</span></td>
      <td style="text-align:center"><span class="stat-cell favorites">${fmt(v.favorites||0)}</span></td>
      <td style="text-align:center"><span class="stat-cell comments">${fmt(v.comments||0)}</span></td>
      <td style="text-align:center"><span class="stat-cell shares">${fmt(v.shares||0)}</span></td>
      <td><span class="date-text">${v.date}</span></td>
      <td><a href="${esc(link)}" target="_blank" class="link-btn" onclick="event.stopPropagation()">🔗 抖音</a></td>
    </tr>`;
  }
  
  html+='</tbody></table></div>';
  // Mobile cards (hidden on desktop, shown on mobile via CSS)
  html+=renderMobileVideoCards(videos);
  return html;
}

function showScriptModal(idx){
  // Find video - use loose equality to handle string/number mismatch
  let video=null;
  for(const cat of DATA.cat_summary){
    for(const topic of cat.topics){
      for(const v of topic.videos){
        if(v.idx==idx){video={...v,_topic:topic.topic,_cat:cat.name};break;}
      }
      if(video)break;
    }
    if(video)break;
  }
  
  if(!video){
    console.error('Video not found for idx:', idx);
    alert('未找到视频数据 (idx: ' + idx + ')');
    return;
  }
  
  // Ensure modal elements exist
  const modalTitle = document.getElementById('modalTitle');
  const modalMeta = document.getElementById('modalMeta');
  const modalScript = document.getElementById('modalScript');
  const scriptModal = document.getElementById('scriptModal');
  
  if(!modalTitle || !modalMeta || !modalScript || !scriptModal){
    console.error('Modal elements not found');
    return;
  }
  
  modalTitle.textContent = video.title || '无标题';
  modalMeta.innerHTML=`
    <span style="color:var(--accent)">${esc(video._cat)}</span> · 
    <span>${esc(video._topic)}</span> · 
    <span style="color:var(--red)">❤️ ${fmt(video.likes)}</span> · 
    <span style="color:var(--orange)">⭐ ${fmt(video.favorites||0)}</span> · 
    <span style="color:var(--blue)">💬 ${fmt(video.comments||0)}</span> · 
    <span style="color:var(--green)">↗️ ${fmt(video.shares||0)}</span>
  `;
  
  // Handle script content
  const scriptContent = (video.script||'').trim();
  modalScript.textContent = scriptContent || '暂无文案';
  
  // Show modal
  scriptModal.classList.add('show');
  document.body.style.overflow = 'hidden'; // Prevent background scrolling

  // Render edit section
  renderEditSection({...video});
}

function closeScriptModal(){
  const scriptModal = document.getElementById('scriptModal');
  if(scriptModal) scriptModal.classList.remove('show');
  document.body.style.overflow = ''; // Restore scrolling
}

function renderVideoGrid(videos){
  return '<div class="video-grid">'+videos.map(v=>{
    const cover=v.cover_url||'';
    const link=v.douyin_link||'#';
    return `<div class="video-card" onclick="window.open('${esc(link)}','_blank')">

function setVideoSort(s){state.sort=s;renderMain();}
function setViewMode(m){state.viewMode=m;renderMain();}
function goToTopic(cat,topic){
  state.curTab='topics';state.curCat=cat;state.curTopic=topic?{cat,topic}:null;
  document.querySelectorAll('.tab-btn').forEach((btn,i)=>btn.classList.toggle('active',i===0));
  document.getElementById('sidebar').style.display='block';
  renderSidebar();renderMain();
}

// ── Topic Edit & Export ──
let edits = {}; // {idx: {oldCat, oldTopic, newCat, newTopic, title}}
let currentModalVideo = null;

function getAllTopics(){
  let result=[];
  for(const cat of DATA.cat_summary){
    for(const t of cat.topics){
      result.push({cat:cat.name, topic:t.topic});
    }
  }
  return result.sort((a,b)=>a.cat.localeCompare(b.cat)||a.topic.localeCompare(b.topic));
}

function renderEditSection(video){
  currentModalVideo = video;
  const wrap = document.getElementById('editTopicWrap');
  const allTopics = getAllTopics();
  const edited = edits[video.idx];
  const curCat = edited ? edited.newCat : video._cat;
  const curTopic = edited ? edited.newTopic : video._topic;

  let catOptions = [...new Set(allTopics.map(t=>t.cat))];
  let topicOptions = allTopics.filter(t=>t.cat===curCat).map(t=>t.topic);

  wrap.innerHTML = `
    <span style="font-size:12px;color:var(--muted)">调整分类：</span>
    <select class="edit-select" id="editCatSelect" onchange="onEditCatChange()">
      ${catOptions.map(c=>`<option value="${esc(c)}"${c===curCat?' selected':''}>${esc(c)}</option>`).join('')}
    </select>
    <select class="edit-select" id="editTopicSelect">
      ${topicOptions.map(t=>`<option value="${esc(t)}"${t===curTopic?' selected':''}>${esc(t)}</option>`).join('')}
    </select>
    <button class="edit-save-btn" onclick="saveTopicEdit()">✓ 保存</button>
    ${edited?'<span class="edit-msg">已修改</span>':''}
  `;
}

function onEditCatChange(){
  const cat = document.getElementById('editCatSelect').value;
  const allTopics = getAllTopics();
  const topicOptions = allTopics.filter(t=>t.cat===cat).map(t=>t.topic);
  const sel = document.getElementById('editTopicSelect');
  sel.innerHTML = topicOptions.map(t=>`<option value="${esc(t)}">${esc(t)}</option>`).join('');
}

function saveTopicEdit(){
  if(!currentModalVideo) return;
  const newCat = document.getElementById('editCatSelect').value;
  const newTopic = document.getElementById('editTopicSelect').value;
  const v = currentModalVideo;

  if(newCat === v._cat && newTopic === v._topic){
    // No change, remove edit if exists
    delete edits[v.idx];
  } else {
    edits[v.idx] = {
      idx: v.idx,
      title: v.title,
      oldCat: v._cat,
      oldTopic: v._topic,
      newCat: newCat,
      newTopic: newTopic
    };
  }

  // Update export button
  const count = Object.keys(edits).length;
  document.getElementById('editCount').textContent = count;
  document.getElementById('exportBtn').classList.toggle('show', count > 0);

  // Re-render edit section to show status
  renderEditSection(currentModalVideo);
}

function exportEdits(){
  const editList = Object.values(edits);
  if(!editList.length) return;

  // Generate readable text + JSON
  let text = '# 母题分类修改记录\\n';
  text += '# 导出时间: ' + new Date().toLocaleString('zh-CN') + '\\n';
  text += '# 共 ' + editList.length + ' 条修改\\n\\n';
  for(const e of editList){
    text += `视频 #${e.idx}: ${e.title}\\n`;
    text += `  原分类: ${e.oldCat} / ${e.oldTopic}\\n`;
    text += `  新分类: ${e.newCat} / ${e.newTopic}\\n\\n`;
  }

  const blob = new Blob([text.replace(/\\n/g,'\\n')], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'topic_edits_' + new Date().toISOString().slice(0,10) + '.txt';
  a.click();
  URL.revokeObjectURL(url);
}

document.getElementById('searchInput').addEventListener('input',(e)=>{
  state.q=e.target.value;
  if(state.curTab==='topics')renderSidebar();
  renderMain();
});

// ── Mobile Drawer ──
function openDrawer(){
  const overlay=document.getElementById('drawerOverlay');
  const drawer=document.getElementById('drawer');
  renderDrawerContent();
  overlay.classList.add('show');
  setTimeout(()=>drawer.classList.add('show'),10);
}
function closeDrawer(){
  const overlay=document.getElementById('drawerOverlay');
  const drawer=document.getElementById('drawer');
  drawer.classList.remove('show');
  setTimeout(()=>overlay.classList.remove('show'),300);
}
function renderDrawerContent(){
  const dc=document.getElementById('drawerContent');
  let html='';
  // "All" option
  html+=`<div class="cat-hdr${!state.curCat?' active':''}" onclick="state.curCat=null;state.curTopic=null;closeDrawer();renderSidebar();renderMain();" style="padding:12px 16px">
    <span class="cat-name">📂 全部母题</span>
    <span class="cat-meta">${DATA.total_topics}个</span>
  </div>`;
  for(const cat of DATA.cat_summary){
    const isOpen=state.curCat===cat.name;
    html+=`<div class="cat-hdr${isOpen?' active':''}" onclick="toggleDrawerCat('${esc(cat.name)}')" style="padding:12px 16px">
      <span class="cat-name">${esc(cat.name)}</span>
      <span class="cat-meta">${cat.count}条 · ${cat.topics.length}母题</span>
    </div>`;
    html+=`<div class="cat-topics${isOpen?' open':''}" id="drawer-cat-${esc(cat.name).replace(/\s/g,'_')}">`;
    for(const t of cat.topics.sort((a,b)=>b.total_likes-a.total_likes)){
      html+=`<div class="topic-row" onclick="goTopic('${esc(cat.name)}','${esc(t.topic)}');closeDrawer();" style="padding:10px 16px 10px 28px;min-height:44px">
        <div class="tname">${esc(t.topic)}</div>
        <div class="tmeta">${t.count}条 · ${fmt(t.total_likes)}赞</div>
      </div>`;
    }
    html+='</div>';
  }
  dc.innerHTML=html;
}
function toggleDrawerCat(name){
  state.curCat=state.curCat===name?null:name;
  state.curTopic=null;
  renderDrawerContent();
}

      </div>
    </div>`;
  }).join('')+'</div>';
}
